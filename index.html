        /* Hero (Ana Karşılama) Bölümü */
        .hero {
            padding: 180px 8% 120px;
            text-align: center;
            /* Logodaki topografik deseni andıran hafif bir arka plan */
            background-color: var(--section-bg);
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, transparent 70%);
            position: relative;
            overflow: hidden;
        }

        /* Hero arkaplanına ince çizgisel detaylar */
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: repeating-linear-gradient(45deg, var(--accent-color) 0, var(--accent-color) 1px, transparent 0, transparent 50%);
