<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Cevo Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="Logo transparent_2.png" alt="Cevo Design" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Ana Sayfa</a></li>
                <li><a href="hizmetler.html">Hizmetler</a></li>
                <li><a href="iletisim.html" class="active">İletişim</a></li>
            </ul>
            <a href="iletisim.html" class="btn-primary">Projeye Başla</a>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>Projeye Başlayalım</h1>
            <p>Fikrinizi hayata geçirmek için ilk adımı atın. Bize detaylardan bahsedin.</p>
        </div>
    </section>

    <section class="contact-section">
        <div class="container" style="max-width: 800px; background: white; padding: 50px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.05);">
            <form>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Ad Soyad</label>
                        <input type="text" placeholder="Adınız Soyadınız">
                    </div>
                    <div class="form-group">
                        <label>E-posta Adresi</label>
                        <input type="email" placeholder="ornek@sirketiniz.com">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Hangi Konuda Desteğe İhtiyacınız Var?</label>
                    <select>
                        <option>Web Tasarım & Geliştirme</option>
                        <option>UI/UX Tasarım</option>
                        <option>Kurumsal Kimlik</option>
                        <option>Sosyal Medya Yönetimi</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Proje Detayları</label>
                    <textarea rows="5" placeholder="Projenizden, hedeflerinizden ve beklentilerinizden kısaca bahsedin..."></textarea>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 20px;">Teklif İste</button>
            </form>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p style="text-align: center;">&copy; 2026 Cevo Design.</p>
        </div>
    </footer>

</body>
</html>
